<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml"
    href="https://img.icons8.com/?size=100&id=gtx2QwlbvAak&format=png&color=000000" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryōshi</title>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('tip-ui-theme');
        if (theme === 'dark' || !theme) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.add('light');
        }
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
